<!DOCTYPE html>
<html>

<title>Real Estate Agent Directory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<body>

<h1>Real Estate Agent Directory</h1>

<h2>Add Agent</h2>

<form id="agentForm">

<input placeholder="Owner Name" id="owner_name" required><br><br>

<input placeholder="Business Name" id="business_name" required><br><br>

<input placeholder="Email" id="email" required><br><br>

<input placeholder="Phone" id="phone" required><br><br>

<button type="submit">Add Agent</button>

</form>

<script>

const supabaseUrl = "https://sfysccrjpadcumqakvbz.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmeXNjY3JqcGFkY3VtcWFrdmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMjAsImV4cCI6MjA4ODI2NzIyMH0.zg-8sziq-2fsbL3LFmGRhSv0m32thTcVS3ZhRb7gn8Y"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

document.getElementById("agentForm").addEventListener("submit", async (e) => {

e.preventDefault()

const owner_name = document.getElementById("owner_name").value
const business_name = document.getElementById("business_name").value
const email = document.getElementById("email").value
const phone = document.getElementById("phone").value

const { data, error } = await supabaseClient
.from("agents")
.insert([
{
"Owner Name": owner_name,
business_name: business_name,
email: email,
phone: phone
}
])

if(error){
alert("Error: " + error.message)
}else{
alert("Agent saved")
}

})

</script>

</body>
